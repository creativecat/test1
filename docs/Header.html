<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animierter Header - Nürnberg Digital Stil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            overflow: hidden;
        }

        /* Animierte Formen */
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.8;
            animation: float 15s infinite ease-in-out;
        }

        .shape-1 {
            background: #4a90e2;
            width: 120px;
            height: 120px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape-2 {
            background: #ffd700;
            width: 80px;
            height: 80px;
            top: 60%;
            left: 25%;
            animation-delay: 2s;
        }

        .shape-3 {
            background: #0056b3;
            width: 150px;
            height: 150px;
            top: 40%;
            left: 70%;
            animation-delay: 4s;
        }

        .shape-4 {
            background: #4a90e2;
            width: 60px;
            height: 60px;
            top: 80%;
            left: 80%;
            animation-delay: 6s;
        }

        .shape-5 {
            background: #ffd700;
            width: 100px;
            height: 100px;
            top: 10%;
            left: 85%;
            animation-delay: 8s;
        }

        .shape-6 {
            background: #0056b3;
            width: 90px;
            height: 90px;
            top: 70%;
            left: 50%;
            animation-delay: 10s;
        }

        /* Rechtecke für Abwechslung */
        .rect {
            position: absolute;
            opacity: 0.7;
            animation: float 20s infinite ease-in-out;
        }

        .rect-1 {
            background: #4a90e2;
            width: 200px;
            height: 40px;
            top: 30%;
            left: 5%;
            border-radius: 5px;
            animation-delay: 1s;
        }

        .rect-2 {
            background: #ffd700;
            width: 150px;
            height: 30px;
            top: 75%;
            left: 15%;
            border-radius: 5px;
            animation-delay: 3s;
        }

        .rect-3 {
            background: #0056b3;
            width: 180px;
            height: 50px;
            top: 50%;
            left: 80%;
            border-radius: 5px;
            animation-delay: 5s;
        }

        /* Text-Overlay */
        .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: #333;
        }

        .text-overlay h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            color: #0056b3;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .text-overlay p {
            font-size: 1.2em;
            color: #666;
            max-width: 600px;
        }

        /* Animationen */
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(5deg);
            }
            50% {
                transform: translateY(10px) rotate(-5deg);
            }
            75% {
                transform: translateY(-15px) rotate(3deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* Responsive Anpassungen */
        @media (max-width: 768px) {
            .text-overlay h1 {
                font-size: 2.5em;
            }
            .text-overlay p {
                font-size: 1em;
            }
            .shape {
                width: 60px !important;
                height: 60px !important;
            }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <!-- Animierte Formen -->
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
        <div class="shape shape-6"></div>
        
        <!-- Rechtecke -->
        <div class="rect rect-1"></div>
        <div class="rect rect-2"></div>
        <div class="rect rect-3"></div>

        <!-- Text-Overlay -->
        <div class="text-overlay">
            <h1>Nürnberg Digital</h1>
            <p>Inspiriert von der offiziellen Website – eine animierte Hommage</p>
        </div>
    </div>

    <script>
        // Dynamische Formen hinzufügen
        function addDynamicShapes() {
            const container = document.querySelector('.header-container');
            const colors = ['#4a90e2', '#ffd700', '#0056b3'];
            
            for (let i = 0; i < 5; i++) {
                const shape = document.createElement('div');
                shape.className = 'shape';
                shape.style.background = colors[Math.floor(Math.random() * colors.length)];
                shape.style.width = `${Math.random() * 100 + 30}px`;
                shape.style.height = shape.style.width;
                shape.style.top = `${Math.random() * 80 + 10}%`;
                shape.style.left = `${Math.random() * 80 + 10}%`;
                shape.style.animationDelay = `${Math.random() * 10}s`;
                container.appendChild(shape);
            }
        }

        // Animation starten
        window.addEventListener('load', () => {
            addDynamicShapes();
        });
    </script>
</body>
</html>
