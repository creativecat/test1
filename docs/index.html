<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Einkaufsliste — Interaktiv</title>
  <style>
    :root{--bg:#f7f7fb;--card:#fff;--accent:#2563eb;--danger:#ef4444}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial; background:var(--bg); margin:0; padding:2rem; color:#0f172a}
    .container{max-width:720px;margin:0 auto}
    header h1{margin:0 0 .25rem 0;font-size:1.5rem}
    header p{margin:0 0 1rem 0;color:#475569}
    .card{background:var(--card);padding:1rem;border-radius:12px;box-shadow:0 6px 18px rgba(2,6,23,0.06)}
    form{display:flex;gap:.5rem;flex-wrap:wrap}
    input[type=text]{flex:1;padding:.5rem .75rem;border-radius:8px;border:1px solid #e6eef8}
    button{background:var(--accent);color:white;border:none;padding:.55rem .85rem;border-radius:8px;cursor:pointer}
    button.danger{background:var(--danger)}
    ul{list-style:none;padding:0;margin:1rem 0 0 0}
    li.item{display:flex;align-items:center;gap:.5rem;padding:.5rem;border-radius:8px;border:1px solid #eef2ff;background:linear-gradient(180deg,rgba(37,99,235,0.03),transparent)}
    .handle{cursor:grab;padding:.25rem .5rem;border-radius:6px;background:#eef2ff}
    .name{flex:1}
    .controls{display:flex;gap:.4rem}
    .muted{color:#64748b;font-size:.9rem}
    .empty{color:#64748b;padding:1rem;text-align:center}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Einkaufsliste</h1>
      <p>Füge Artikel hinzu, entferne sie oder sortiere sie per Drag & Drop. Änderungen werden im Browser gespeichert.</p>
    </header>

    <main class="card" id="app">
      <form id="addForm" aria-label="Artikel hinzufügen">
        <input type="text" id="itemInput" placeholder="Neuen Artikel eingeben (z. B. Milch)" aria-label="Artikelname" required />
        <button id="addBtn" type="submit">Hinzufügen</button>
        <button id="clearBtn" type="button" class="danger" title="Alle Artikel löschen">Alles löschen</button>
      </form>

      <p class="muted" id="count"></p>

      <ul id="list" aria-live="polite" aria-label="Einkaufsliste"></ul>
      <p class="empty" id="emptyText">Keine Artikel — füge einen neuen Artikel hinzu.</p>
    </main>

    <footer style="margin-top:.75rem;color:#475569;font-size:.9rem">Tip: Du kannst Elemente mit der linken Maustaste anfassen und verschieben. Die Liste wird lokal gespeichert.</footer>
  </div>

  <script>
    // Einfaches Ein-Datei-Webapp: Artikel hinzufügen, entfernen, umsortieren (Drag & Drop), in localStorage speichern.
    const STORAGE_KEY = 'einkaufsliste.v1'
    let items = []

    const listEl = document.getElementById('list')
    const inputEl = document.getElementById('itemInput')
    const formEl = document.getElementById('addForm')
    const countEl = document.getElementById('count')
    const emptyText = document.getElementById('emptyText')
    const clearBtn = document.getElementById('clearBtn')

    // Laden
    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY)
        items = raw ? JSON.parse(raw) : []
      } catch (e) { items = [] }
      render()
    }

    // Speichern
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items))
      updateCount()
    }

    function updateCount() {
      countEl.textContent = items.length ? `${items.length} Artikel` : ''
      emptyText.style.display = items.length ? 'none' : 'block'
    }

    // Rendern der Liste
    function render() {
      listEl.innerHTML = ''
      items.forEach((it, index) => {
        const li = document.createElement('li')
        li.className = 'item'
        li.draggable = true
        li.dataset.index = index

        // Drag handle
        const handle = document.createElement('span')
        handle.className = 'handle'
        handle.title = 'Element greifen und ziehen'
        handle.textContent = '☰'
        handle.setAttribute('aria-hidden','true')
        li.appendChild(handle)

        const name = document.createElement('div')
        name.className = 'name'
        name.textContent = it
        li.appendChild(name)

        const controls = document.createElement('div')
        controls.className = 'controls'

        const up = document.createElement('button')
        up.type = 'button'
        up.title = 'Nach oben'
        up.textContent = '▲'
        up.addEventListener('click', () => move(index, index - 1))
        controls.appendChild(up)

        const down = document.createElement('button')
        down.type = 'button'
        down.title = 'Nach unten'
        down.textContent = '▼'
        down.addEventListener('click', () => move(index, index + 1))
        controls.appendChild(down)

        const del = document.createElement('button')
        del.type = 'button'
        del.title = 'Entfernen'
        del.textContent = '✕'
        del.className = 'danger'
        del.addEventListener('click', () => remove(index))
        controls.appendChild(del)

        li.appendChild(controls)

        // Drag events
        li.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', index)
          e.dataTransfer.effectAllowed = 'move'
          li.style.opacity = '0.6'
        })
        li.addEventListener('dragend', () => { li.style.opacity = '' })

        li.addEventListener('dragover', (e) => {
          e.preventDefault()
          e.dataTransfer.dropEffect = 'move'
        })

        li.addEventListener('drop', (e) => {
          e.preventDefault()
          const from = Number(e.dataTransfer.getData('text/plain'))
          const to = Number(li.dataset.index)
          if (!Number.isFinite(from) || !Number.isFinite(to)) return
          reorder(from, to)
        })

        listEl.appendChild(li)
      })
      save()
    }

    // Reorder by moving element from -> to
    function reorder(from, to) {
      if (from === to) return
      const item = items.splice(from, 1)[0]
      items.splice(to, 0, item)
      render()
    }

    function move(from, to) {
      if (to < 0) to = 0
      if (to >= items.length) to = items.length - 1
      reorder(from, to)
    }

    function add(text) {
      const t = text.trim()
      if (!t) return
      items.push(t)
      render()
      inputEl.value = ''
      inputEl.focus()
    }

    function remove(index) {
      if (index < 0 || index >= items.length) return
      items.splice(index,1)
      render()
    }

    formEl.addEventListener('submit', (e) => {
      e.preventDefault()
      add(inputEl.value)
    })

    clearBtn.addEventListener('click', () => {
      if (!confirm('Alle Artikel wirklich löschen?')) return
      items = []
      render()
    })

    // Keyboard accessibility: allow dropping by Enter while focused on an item (move to top)
    listEl.addEventListener('keydown', (e) => {
      // not implementing complex keyboard reordering here; basic navigation will work
    })

    // Initial load
    load()

    // Expose for debugging in console
    window.einkaufsliste = {get: () => items.slice(), add, remove, reorder}
  </script>
</body>
</html>
